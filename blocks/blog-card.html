<!-- FILE: blocks/blog-card.html -->
<article class="blog-card">
  <!-- IMG:img-blog-thumb -->
  <div class="img-fallback-panel" style="min-height:200px;position:relative;overflow:hidden;">
    <img src="/generated/ill-blog-thumb.webp" alt="{{blog_card_img_alt}}" data-img-role="content" loading="lazy" style="width:100%;height:200px;object-fit:cover;">
    <!-- Category pill overlay -->
    <span class="badge-accent" style="position:absolute;top:var(--sp-2);left:var(--sp-2);">{{blog_card_category}}</span>
  </div>

  <div class="blog-card-body">
    <h4 style="font-family:var(--font-display);font-weight:400;font-size:var(--text-h6);margin-bottom:var(--sp-1);">
      <a href="{{blog_card_url}}" style="color:var(--text-primary);text-decoration:none;">
        {{blog_card_title}}
      </a>
    </h4>
    <p style="font-size:var(--text-xs);color:var(--text-secondary);margin-bottom:var(--sp-1);">
      {{blog_card_date}} &middot; {{blog_card_read_time}}
    </p>
    <p style="font-size:var(--text-sm);color:var(--text-secondary);line-height:var(--lh-relaxed);margin-bottom:var(--sp-2);">
      {{blog_card_excerpt}}
    </p>
    <a href="{{blog_card_url}}" style="font-size:var(--text-sm);font-weight:600;color:var(--copper);">
      {{blog_card_link_text}} &rarr;
    </a>
  </div>
</article>

<!-- FILE: blocks/section-heading.html -->
<!-- Variant: Centered -->
<div class="section-heading">
  <span class="section-eyebrow">{{section_eyebrow}}</span>
  <h2 class="section-title">{{section_title}}</h2>
  <p style="font-size:var(--text-lg);color:var(--text-secondary);max-width:55ch;margin-inline:auto;line-height:var(--lh-relaxed);">
    {{section_subheadline}}
  </p>
</div>

<!-- Variant: Left-aligned -->
<div style="margin-bottom:var(--sp-6);text-align:left;">
  <span class="section-eyebrow">{{section_eyebrow}}</span>
  <h2 class="section-title">{{section_title}}</h2>
  <p style="font-size:var(--text-lg);color:var(--text-secondary);max-width:55ch;line-height:var(--lh-relaxed);">
    {{section_subheadline}}
  </p>
</div>

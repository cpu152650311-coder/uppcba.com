<!-- FILE: blocks/spec-table.html -->
<table class="spec-table" style="width:100%;border-collapse:collapse;font-size:var(--text-sm);">
  <tbody>
    <tr style="border-bottom:1px solid var(--border-default);">
      <td style="padding:var(--sp-2) var(--sp-3);font-weight:600;color:var(--text-secondary);white-space:nowrap;width:40%;">
        {{spec_param_1}}
      </td>
      <td style="padding:var(--sp-2) var(--sp-3);color:var(--text-primary);">
        {{spec_value_1}}
      </td>
    </tr>
    <tr style="border-bottom:1px solid var(--border-default);background:var(--surface-gray);">
      <td style="padding:var(--sp-2) var(--sp-3);font-weight:600;color:var(--text-secondary);white-space:nowrap;">
        {{spec_param_2}}
      </td>
      <td style="padding:var(--sp-2) var(--sp-3);color:var(--text-primary);">
        {{spec_value_2}}
      </td>
    </tr>
    <tr style="border-bottom:1px solid var(--border-default);">
      <td style="padding:var(--sp-2) var(--sp-3);font-weight:600;color:var(--text-secondary);white-space:nowrap;">
        {{spec_param_3}}
      </td>
      <td style="padding:var(--sp-2) var(--sp-3);color:var(--copper);font-weight:600;">
        {{spec_value_3_highlight}}
      </td>
    </tr>
    <tr style="border-bottom:1px solid var(--border-default);background:var(--surface-gray);">
      <td style="padding:var(--sp-2) var(--sp-3);font-weight:600;color:var(--text-secondary);white-space:nowrap;">
        {{spec_param_4}}
      </td>
      <td style="padding:var(--sp-2) var(--sp-3);color:var(--text-primary);">
        {{spec_value_4}}
      </td>
    </tr>
  </tbody>
</table>
